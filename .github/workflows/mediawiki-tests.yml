name: MediaWiki config smoke test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  smoke-test:
    name: "${{ matrix.mw }} | PHP ${{ matrix.php }}"
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.experimental }}

    strategy:
      fail-fast: false
      matrix:
        include:

          # Latest MediaWiki stable - PHP 8.4
          - mw: 'REL1_45'
            php: '8.4'
            experimental: false

          # Latest MediaWiki alpha - PHP 8.4
          - mw: 'REL1_46'
            php: '8.4'
            experimental: true

          # Latest MediaWiki master - PHP 8.4
          - mw: 'master'
            php: '8.4'
            experimental: true

    steps:
      - name: Checkout mw-config
        uses: actions/checkout@v4
        with:
          path: mw-config

      - name: Checkout MediaWiki core (${{ matrix.mw }})
        uses: actions/checkout@v4
        with:
          repository: wikimedia/mediawiki
          ref: ${{ matrix.mw }}
          path: core
          fetch-depth: 1

      - name: Checkout WikiOasisMagic
        uses: actions/checkout@v4
        with:
          repository: WikiOasis/WikiOasisMagic
          path: core/extensions/WikiOasisMagic
          fetch-depth: 1

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2

      - name: Cache composer downloads
        uses: actions/cache@v4
        with:
          path: ~/.cache/composer
          key: composer-${{ matrix.mw }}-${{ hashFiles('core/composer.lock') }}
          restore-keys: |
            composer-${{ matrix.mw }}-

      - name: Install MediaWiki core dependencies
        working-directory: core
        run: composer install --no-dev --prefer-dist --no-progress --no-interaction --ignore-platform-reqs

      - name: Merge WikiOasisMagic's composer dependencies
        working-directory: core
        run: |
          cat > composer.local.json <<'EOF'
          {
              "extra": {
                  "merge-plugin": {
                      "include": [
                          "extensions/*/composer.json",
                          "skins/*/composer.json"
                      ]
                  }
              }
          }
          EOF
          composer update --no-dev --prefer-dist --no-progress --no-interaction --ignore-platform-reqs

      - name: Install mw-config as MediaWiki's config directory
        run: |
          cp -r mw-config/. core/config/
          rm -rf core/config/.git core/config/.github

      - name: Stub out the other wfLoadExtensions()/wfLoadSkins() targets
        run: python3 mw-config/.github/workflows/stub-extensions.py core

      - name: Boot LocalSettings.php against MediaWiki core
        run: php mw-config/.github/workflows/smoke-test.php "$GITHUB_WORKSPACE/core"
